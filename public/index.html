<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CS2Ops</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>CS2Ops</h1>
      </div>

      <div class="actions">
        <span class="badge" id="themeBadge">Light</span>
        <button class="btn btn-primary" id="themeToggle" title="Darkmode umschalten">
          <span class="icon" aria-hidden="true">🌙</span>
          <span style="font-weight:900;">Darkmode</span>
        </button>
      </div>
    </div>

    <div class="grid">
      <!-- CVAR -->
      <div class="card cfg">
        <h2>Configs / CVARs <span class="badge">CVAR</span></h2>
        <div class="row">
          <input id="cvarName" class="grow" placeholder="mp_afterroundmoney">
          <input id="cvarValue" class="grow" placeholder="z.B. 16000">
          <button class="btn btn-action" id="cvarSet">Set</button>
        </div>

        <div class="pillbar">
          <button class="pill" data-cvar="mp_afterroundmoney" data-val="16000">mp_afterroundmoney=16000</button>
          <button class="pill" data-cvar="mp_round_restart_delay" data-val="7">mp_round_restart_delay=7</button>
          <button class="pill" data-cvar="mp_restartgame" data-val="1">mp_restartgame=1</button>
        </div>
      </div>

      <!-- MAP -->
      <div class="card map">
        <h2>Change map <span class="badge">MAP</span></h2>

        <div id="maps" class="map-grid"></div>

        <div class="section-title">
          <div class="badge">WORKSHOP FAVORITES</div>
          <button class="mini-btn mini-danger" id="wsClear" title="Delete all saved workshop maps">Clear</button>
        </div>

        <div id="workshopSaved" class="ws-list"></div>

        <hr class="divider">

        <div class="row">
          <input id="workshopId" class="grow" placeholder="Workshop Map ID (e.g. 3070689635)">
          <input id="workshopName" class="grow" placeholder="Name (e.g. Aim Map / Mirage Night)">
          <button class="btn btn-action" id="wsStart">Start workshop</button>
          <button class="btn" id="wsSave">Save map</button>
        </div>

        <p class="subtle">Workshop favorites will be saved in the local storage of the browser.</p>
      </div>

      <!-- PLAYERS -->
      <div class="card players">
        <h2>Users / Players <span class="badge">PLAYERS</span></h2>

        <div class="players-top">
          <input id="playerSearch" class="grow" placeholder="Search player (Name/UserID)..." autocomplete="off">
          <input id="kickReason" class="grow" placeholder="Kick reason (optional)">
          <span class="tag" id="playerCount">0 online</span>
          <button class="btn" id="playersReload">Reload</button>
        </div>

        <div id="playersList" class="players-list"></div>
      </div>

      <!-- CONSOLE -->
      <div class="card span-2">
        <h2>Console <span class="badge">RCON</span></h2>

        <div class="row console-row">
          <div class="console-input-wrap">
            <input id="cmd" class="grow" placeholder="status / mp_round_restart_delay 7 / ..." autocomplete="off">
            <div id="ac"></div>
          </div>

          <button class="btn btn-action" id="cmdSend">Send</button>
        </div>

        <textarea id="out" readonly placeholder="Output..."></textarea>
      </div>

      <!-- LOGS -->
      <div class="card span-2">
        <h2>Live Logs <span class="badge" id="logBadge">LIVE</span></h2>
        <div class="row">
          <button class="btn" id="logClear">Clear</button>
          <label class="toggle">
            <input type="checkbox" id="rconToggle">
            <span>show RCON logs</span>
          </label>
        </div>
        <pre id="logbox" class="mono logbox"></pre>
      </div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
