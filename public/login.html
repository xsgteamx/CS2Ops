<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CS2Ops Login</title>
  <style>
    :root{
      color-scheme: dark;
      --bg:#0b1020;
      --panel:rgba(15,23,42,.78);
      --text:#edf5ff;
      --muted:#9fb0c8;
      --border:rgba(148,163,184,.22);
      --blue:#60a5fa;
      --green:#34d399;
      --orange:#fbbf24;
      --danger:#fb7185;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text);
      background:
        radial-gradient(900px 420px at 12% 4%, rgba(96,165,250,.32), transparent 58%),
        radial-gradient(820px 420px at 92% 10%, rgba(52,211,153,.20), transparent 58%),
        radial-gradient(760px 420px at 48% 100%, rgba(251,191,36,.16), transparent 60%),
        var(--bg);
    }
    .shell{
      width:min(980px,100%);
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      border:1px solid var(--border);
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
      box-shadow:0 24px 70px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
    }
    .hero{
      padding:38px;
      min-height:520px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      background:
        linear-gradient(135deg,rgba(96,165,250,.24),transparent 42%),
        linear-gradient(225deg,rgba(52,211,153,.18),transparent 42%);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:950;
      letter-spacing:.2px;
      font-size:22px;
    }
    .mark{
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--blue),var(--green) 58%,var(--orange));
      box-shadow:0 14px 32px rgba(96,165,250,.24);
    }
    h1{
      margin:0;
      max-width:520px;
      font-size:42px;
      line-height:1.06;
      letter-spacing:0;
    }
    .hero p{
      max-width:520px;
      margin:14px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }
    .login{
      background:var(--panel);
      padding:38px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .login h2{margin:0 0 8px;font-size:24px}
    .login .sub{margin:0 0 24px;color:var(--muted);font-size:14px;line-height:1.5}
    label{display:block;margin:14px 0 7px;color:#dbeafe;font-size:13px;font-weight:800}
    input{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 13px;
      outline:none;
      background:#0b1220;
      color:var(--text);
      font:inherit;
    }
    input:focus{
      border-color:rgba(96,165,250,.72);
      box-shadow:0 0 0 4px rgba(96,165,250,.15);
    }
    button{
      width:100%;
      margin-top:22px;
      border:0;
      border-radius:14px;
      padding:13px 14px;
      cursor:pointer;
      color:#06111f;
      background:linear-gradient(135deg,var(--blue),var(--green));
      font-weight:950;
      font-size:15px;
      box-shadow:0 14px 30px rgba(52,211,153,.18);
    }
    .error{
      display:none;
      margin:0 0 16px;
      padding:10px 12px;
      border:1px solid rgba(251,113,133,.32);
      border-radius:12px;
      color:#fecdd3;
      background:rgba(127,29,29,.22);
      font-size:13px;
      line-height:1.45;
    }
    .captcha{
      display:none;
      margin-top:14px;
    }
    .captcha-row{
      display:grid;
      grid-template-columns: 170px 1fr;
      gap:10px;
      align-items:center;
    }
    .captcha img{
      width:170px;
      height:62px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#0b1220;
    }
    .captcha-refresh{
      width:auto;
      margin-top:8px;
      padding:8px 10px;
      color:#dbeafe;
      background:rgba(15,23,42,.48);
      border:1px solid var(--border);
      box-shadow:none;
      font-size:12px;
    }
    .hint{
      margin-top:16px;
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
    }
    @media (max-width: 820px){
      .shell{grid-template-columns:1fr}
      .hero{min-height:auto;padding:28px}
      h1{font-size:32px}
      .login{padding:28px}
      .captcha-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="brand"><div class="mark"></div><span>CS2Ops</span></div>
      <div>
        <h1>CS2Ops 控制台</h1>
        <p>登录后管理服务器控制台、地图、玩家和实时日志。</p>
      </div>
      <p>仅限授权用户访问。</p>
    </section>
    <section class="login">
      <h2>登录面板</h2>
      <p class="sub">请输入账号和密码。</p>
      <div class="error" id="loginError">账号或密码不正确。</div>
      <form method="post" action="login">
        <label for="user">用户名</label>
        <input id="user" name="user" autocomplete="username" autofocus>
        <label for="pass">密码</label>
        <input id="pass" name="pass" type="password" autocomplete="current-password">
        <div class="captcha" id="captchaBox">
          <label for="captcha">验证码</label>
          <div class="captcha-row">
            <img id="captchaImage" alt="验证码" width="170" height="62">
            <input id="captcha" name="captcha" inputmode="numeric" autocomplete="off" placeholder="请输入结果">
          </div>
          <button class="captcha-refresh" id="captchaRefresh" type="button">换一题</button>
        </div>
        <button type="submit">进入 CS2Ops</button>
      </form>
      <div class="hint">如果无法登录，请联系管理员。</div>
    </section>
  </main>
  <script>
    (() => {
      const form = document.querySelector("form");
      const user = document.querySelector("#user");
      const error = document.querySelector("#loginError");
      const captchaBox = document.querySelector("#captchaBox");
      const captchaImage = document.querySelector("#captchaImage");
      const captchaRefresh = document.querySelector("#captchaRefresh");
      const captchaInput = document.querySelector("#captcha");
      const params = new URLSearchParams(window.location.search);

      if (params.get("login") === "failed") error.style.display = "block";

      try {
        const saved = sessionStorage.getItem("cs2ops_login_user");
        if (saved && !user.value) user.value = saved;
      } catch {}

      function captchaUrl() {
        return "login/captcha?user=" + encodeURIComponent(user.value.trim()) + "&t=" + Date.now();
      }

      async function refreshCaptchaStatus() {
        const name = user.value.trim();
        if (!name) {
          captchaBox.style.display = "none";
          captchaImage.removeAttribute("src");
          return;
        }
        const res = await fetch("login/captcha-status?user=" + encodeURIComponent(name), { cache: "no-store" });
        const data = await res.json().catch(() => ({}));
        if (data.required) {
          captchaBox.style.display = "block";
          captchaImage.src = captchaUrl();
        } else {
          captchaBox.style.display = "none";
          captchaImage.removeAttribute("src");
          captchaInput.value = "";
        }
      }

      user.addEventListener("change", refreshCaptchaStatus);
      user.addEventListener("blur", refreshCaptchaStatus);
      captchaRefresh.addEventListener("click", () => {
        captchaImage.src = captchaUrl();
        captchaInput.focus();
      });
      form.addEventListener("submit", () => {
        try { sessionStorage.setItem("cs2ops_login_user", user.value.trim()); } catch {}
      });
      refreshCaptchaStatus().catch(() => {});
    })();
  </script>
</body>
</html>
