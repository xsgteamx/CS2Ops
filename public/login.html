<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CS2Ops Login</title>
  <style>
    :root{
      color-scheme: dark;
      --bg:#0b1020;
      --panel:rgba(15,23,42,.78);
      --text:#edf5ff;
      --muted:#9fb0c8;
      --border:rgba(148,163,184,.22);
      --blue:#60a5fa;
      --green:#34d399;
      --orange:#fbbf24;
      --danger:#fb7185;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--text);
      background:
        radial-gradient(900px 420px at 12% 4%, rgba(96,165,250,.32), transparent 58%),
        radial-gradient(820px 420px at 92% 10%, rgba(52,211,153,.20), transparent 58%),
        radial-gradient(760px 420px at 48% 100%, rgba(251,191,36,.16), transparent 60%),
        var(--bg);
    }
    .shell{
      width:min(980px,100%);
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      border:1px solid var(--border);
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
      box-shadow:0 24px 70px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
    }
    .hero{
      padding:38px;
      min-height:520px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      background:
        linear-gradient(135deg,rgba(96,165,250,.24),transparent 42%),
        linear-gradient(225deg,rgba(52,211,153,.18),transparent 42%);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:950;
      letter-spacing:.2px;
      font-size:22px;
    }
    .mark{
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--blue),var(--green) 58%,var(--orange));
      box-shadow:0 14px 32px rgba(96,165,250,.24);
    }
    h1{
      margin:0;
      max-width:520px;
      font-size:42px;
      line-height:1.06;
      letter-spacing:0;
    }
    .hero p{
      max-width:520px;
      margin:14px 0 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }
    .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
    .chip{
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 11px;
      color:#dbeafe;
      background:rgba(15,23,42,.32);
      font-size:12px;
      font-weight:800;
    }
    .login{
      background:var(--panel);
      padding:38px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .login h2{margin:0 0 8px;font-size:24px}
    .login .sub{margin:0 0 24px;color:var(--muted);font-size:14px;line-height:1.5}
    label{display:block;margin:14px 0 7px;color:#dbeafe;font-size:13px;font-weight:800}
    input{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 13px;
      outline:none;
      background:#0b1220;
      color:var(--text);
      font:inherit;
    }
    input:focus{
      border-color:rgba(96,165,250,.72);
      box-shadow:0 0 0 4px rgba(96,165,250,.15);
    }
    button{
      width:100%;
      margin-top:22px;
      border:0;
      border-radius:14px;
      padding:13px 14px;
      cursor:pointer;
      color:#06111f;
      background:linear-gradient(135deg,var(--blue),var(--green));
      font-weight:950;
      font-size:15px;
      box-shadow:0 14px 30px rgba(52,211,153,.18);
    }
    .hint{
      margin-top:16px;
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
    }
    @media (max-width: 820px){
      .shell{grid-template-columns:1fr}
      .hero{min-height:auto;padding:28px}
      h1{font-size:32px}
      .login{padding:28px}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="brand"><div class="mark"></div><span>CS2Ops</span></div>
      <div>
        <h1>轻量 CS2 RCON 管理后台</h1>
        <p>保留 RCON 管理能力，支持 Docker 本机日志、HTTP 远程日志和禁用日志三种模式。适合把面板部署在 VPS，CS2 服务器放在局域网或微服里的场景。</p>
        <div class="chips">
          <span class="chip">RCON 控制</span>
          <span class="chip">HTTP Remote Log</span>
          <span class="chip">中文界面</span>
        </div>
      </div>
      <p>登录后进入控制台。凭据只在后端校验，不会暴露 RCON 密码或 HTTP log secret。</p>
    </section>
    <section class="login">
      <h2>登录面板</h2>
      <p class="sub">请输入面板账号密码。</p>
      <form method="post" action="/login">
        <label for="user">用户名</label>
        <input id="user" name="user" autocomplete="username" autofocus>
        <label for="pass">密码</label>
        <input id="pass" name="pass" type="password" autocomplete="current-password">
        <button type="submit">进入 CS2Ops</button>
      </form>
      <div class="hint">如果登录失败，请检查 `.env` 中的 `PANEL_USER` 和 `PANEL_PASS`。</div>
    </section>
  </main>
</body>
</html>
